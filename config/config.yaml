dir: artifact

data_ingestion:
  root_dir: artifact/data_ingestion
  source_url: "https://github.com/HimmatMagar/datae/raw/refs/heads/main/WA_Fn-UseC_-Telco-Customer-Churn.zip"
  zip_file: artifact/data_ingestion/data.zip
  unzip_file: artifact/data_ingestion


data_transformation:
  root_dir: artifact/data_transformation
  data_source: artifact/data_ingestion/WA_Fn-UseC_-Telco-Customer-Churn.csv


model_building:
  root_dir: artifact/model_building
  xTrain_data: artifact/data_transformation/xTrain.pkl
  yTrain_data: artifact/data_transformation/yTrain.pkl
  model_path: model.pkl


model_evaluation:
  root_dir: artifact/model_evaluation
  xTest_data: artifact/data_transformation/xTest.pkl
  yTest_data: artifact/data_transformation/yTest.pkl
  model: artifact/model_building/model.pkl
  metric: artifact/model_evaluation/metric.json
